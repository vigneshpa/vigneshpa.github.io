<html>
<Head>
<script>
function exem(){
var nums=document.getElementById("inp").value;
var num =parseFloat(nums);
alert(num+1);
var isprime = 1;
for(var i=2;i<num;i++){
  if(num%i == 0){isprime=0}
};if(isprime==1){
document.getElementById("res").innerHTML += "<br>"+num;
}}
</script>
</head>
<body>
<div><input type="num" id="inp"><button onClick="exem()">submit</button></div>
<div id="res"></div>
</body>
</Html>
