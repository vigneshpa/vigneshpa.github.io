<html>
<Head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
function exem(){
var nums=document.getElementById("inp").value;
var num =parseFloat(nums);
var isprime = 1;
for(var j=1;j<num;j++){
isprime=1;
for(var i=2;i<j;i++){
  if(j%i == 0){isprime=0;i=j;}
};if(isprime==1){
var dat=document.getElementById("res").innerHTML;
document.getElementById("res").innerHTML = ""+j+"<br>"+dat;
}}}
</script>
</head>
<body>
<div><input type="num" id="inp"><button onClick="exem()">submit</button></div>
<div id="res"><br>developed by Vignesh at SVCE.</div>
</body>
</Html>
